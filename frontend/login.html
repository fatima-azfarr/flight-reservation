<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyWay — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

<nav class="navbar">
  <a class="nav-brand" href="index.html">✈ SkyWay</a>
  <div></div>
  <div class="nav-auth">
    <a href="register.html" class="btn-outline">Register</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-icon">✈</span>
      <h1>Welcome Back</h1>
      <p>Sign in to your SkyWay account</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" />
    </div>

    <div class="auth-options">
      <label class="remember-me">
        <input type="checkbox"/> Remember me
      </label>
      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-solid full-width" onclick="login()">Sign In</button>
    <div id="loginMsg" class="msg"></div>

    <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
async function login() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const msg = document.getElementById('loginMsg');

  if (!email || !password) {
    return showMsg(msg, 'Please enter email and password.', 'error');
  }

  showMsg(msg, 'Signing in...', 'info');

  const result = await api.post('/auth/login', { email, password });

  if (result.error) {
    showMsg(msg, result.error, 'error');
  } else {
    localStorage.setItem('token', result.token);
    localStorage.setItem('user', JSON.stringify(result.user));
    showMsg(msg, 'Login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
